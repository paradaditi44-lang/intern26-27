<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Watch Clock</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: radial-gradient(circle,#1a1a1a,#000);
    font-family: Arial, sans-serif;
}

/* Watch Body */
.watch{
    width:280px;
    height:280px;
    border-radius:50%;
    background: #111;
    border: 10px solid #2c2c2c;
    box-shadow:
        0 0 30px rgba(0,255,255,0.2),
        inset 0 0 20px rgba(0,0,0,0.8);
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
}

/* Inner Screen */
.screen{
    width:220px;
    height:220px;
    border-radius:50%;
    background: linear-gradient(145deg,#0f0f0f,#1c1c1c);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    color:#00ffff;
    box-shadow: inset 0 0 15px rgba(0,0,0,0.8);
}

/* Time */
#time{
    font-size:32px;
    font-weight:bold;
    letter-spacing:2px;
}

/* Label */
#label{
    font-size:12px;
    color:#aaa;
    margin-top:8px;
    letter-spacing:1px;
}
</style>
</head>

<body>

<div class="watch">
    <div class="screen">
        <div id="time">00:00:00</div>
        <div id="label">SMART WATCH</div>
    </div>
</div>

<script>
function updateTime(){
    const now = new Date();

    let h = now.getHours();
    let m = now.getMinutes().toString().padStart(2,"0");
    let s = now.getSeconds().toString().padStart(2,"0");

    const ampm = h >= 12 ? "PM" : "AM";
    h = h % 12 || 12;

    document.getElementById("time").textContent =
        `${h}:${m}:${s} ${ampm}`;
}

updateTime();
setInterval(updateTime,1000);
</script>

</body>
</html>
